<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Aqila Usrat</title>
</head>
<body>

    <header>
        <nav>
            <hr>
            <a href="index.html">Home</a> |
            <a href="educations.html">Education</a> |
            <a href="experience.html">Experience</a> |
            <a href="projects.html">Projects</a> |
            <a href="contact.html">Contact</a>
            <hr>
        </nav>
    </header>

    <h1>Contact - Aqila Usrat</h1>
    <p>Please fill out the form below to contact me for projects, thesis work, or job-related opportunities.</p>

    <form method="post">

        <fieldset>
            <legend>Contact Form</legend>

            <table cellpadding="8">

                <tr>
                    <td><label for="firstName">First Name  -</label></td>
                    <td>
                        <input type="text" id="firstName" name="firstName" placeholder="Enter first name" required>
                    </td>
                </tr>

                <tr>
                    <td><label for="lastName">Last Name  -</label></td>
                    <td>
                        <input type="text" id="lastName" name="lastName" placeholder="Enter last name" required>
                    </td>
                </tr>

                <tr>
                    <td><label>Gender  -</label></td>
                    <td>
                        <input type="radio" id="male" name="gender" value="male" required>
                        <label for="male">Male</label>

                        <input type="radio" id="female" name="gender" value="female">
                        <label for="female">Female</label>
                    </td>
                </tr>

                <tr>
                    <td><label for="email">Email -</label></td>
                    <td>
                        <input type="email" id="email" name="email" placeholder="Enter email address" required>
                    </td>
                </tr>

                <tr>
                    <td><label for="companyName">Company -</label></td>
                    <td>
                        <input type="text" id="companyName" name="companyName" placeholder="Enter company name">
                    </td>
                </tr>

                <tr>
                    <td><label>Reason of Contact  -</label></td>
                    <td>
                        <input type="radio" id="projects" name="reason" value="projects" required>
                        <label for="projects">Projects</label>

                        <input type="radio" id="thesis" name="reason" value="thesis">
                        <label for="thesis">Thesis</label>

                        <input type="radio" id="job" name="reason" value="job">
                        <label for="job">Job</label>
                    </td>
                </tr>

                <tr>
                    <td><label>Topics -</label></td>
                    <td>
                        <input type="checkbox" id="web" name="topic[]" value="web">
                        <label for="web">Web Development</label>

                        <input type="checkbox" id="mobile" name="topic[]" value="mobile">
                        <label for="mobile">Mobile Development</label>

                        <input type="checkbox" id="aiml" name="topic[]" value="aiml">
                        <label for="aiml">AI/ML Development</label>
                    </td>
                </tr>

                <tr>
                    <td><label for="cdate">Consultation Date (required) -</label></td>
                    <td>
                        <input type="date" id="cdate" name="cdate" required>
                    </td>
                </tr>

                <tr>
                    <td></td>
                    <td>
                        <input type="submit" value="Submit">
                        <input type="reset" value="Reset">
                    </td>
                </tr>

            </table>
        </fieldset>

    </form>

    <br>
    <a href="index.html">Back to Home</a>

</body>
</html>
