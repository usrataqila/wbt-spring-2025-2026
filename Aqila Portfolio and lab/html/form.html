<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Form</title>
    <link rel="stylesheet" type="text/css" href="../css/form.css">
</head>
<body>
 
    <main>
        <h1>Donor Information</h1>
 
        <div class="donor-form">
            <form method="post">
                <fieldset>
                    <legend>Donor Information</legend>
 
                    <table>
                        <tr>
                            <td><label for="firstname">First Name *</span></label></td>
                            <td><input type="text" id="firstname" name="firstname" required></td>
                        </tr>
 
                        <tr>
                            <td><label for="lastname">Last Name*</label></td>
                            <td><input type="text" id="lastname" name="lastname" required></td>
                        </tr>
 
                        <tr>
                            <td><label for="company">Company</label></td>
                            <td><input type="text" id="company" name="company"></td>
                        </tr>
 
                        <tr>
                            <td><label for="address1">Address 1*</label></td>
                            <td><input type="text" id="address1" name="address1" required></td>
                        </tr>
 
                        <tr>
                            <td><label for="address2">Address 2</label></td>
                            <td><input type="text" id="address2" name="address2"></td>
                        </tr>
 
                        <tr>
                            <td><label for="city">City*</label></td>
                            <td><input type="text" id="city" name="city" required></td>
                        </tr>
 
                        <tr>
                            <td><label for="state">State*</label></td>
                            <td>
                                <select id="state" name="state" required>
                                    <option value="">Select a State</option>
                                   
                                </select>
                            </td>
                        </tr>
 
                        <tr>
                            <td><label for="zip">Zip Code*</label></td>
                            <td><input type="text" id="zip" name="zip" required></td>
                        </tr>
 
                        <tr>
                            <td><label for="country">Country*</label></td>
                            <td>
                                <select id="country" name="country" required>
                                    <option value="">Select a Country</option>
                                    <option value="US">bd</option>
   
                                </select>
                            </td>
                        </tr>
 
                        <tr>
                            <td><label for="phone">Phone</label></td>
                            <td><input type="text" id="phone" name="phone"></td>
                        </tr>
 
                        <tr>
                            <td><label for="fax">Fax</label></td>
                            <td><input type="text" id="fax" name="fax"></td>
                        </tr>
 
                        <tr>
                            <td><label for="email">Email*</label></td>
                            <td><input type="email" id="email" name="email" required></td>
                        </tr>
 
                        <tr>
                            <td>
                                <label>Donation Amount*</label>
                                <br>
                                <span class="field-note">(Check a button or type in your amount)</span>
                            </td>
                            <td>
                                <input type="radio" name="donation" value="none" checked required> None
                                <input type="radio" name="donation" value="50"> $50
                                <input type="radio" name="donation" value="75"> $75
                                 <input type="radio" name="donation" value="100"> $100
                                 <input type="radio" name="donation" value="250"> $250



                            </td>
                        </tr>
 
                        <tr>
                            <td></td>
                            <td><label for="other-amount">Other Amount $</label> <input type="text" id="other-amount" name="other-amount"></td>
                        </tr>
 
                        <tr>
                            <td>
                                <label>Recurring Donation</label>
                                <br>
                                <span class="field-note">(Check if yes)</span>
                            </td>
                            <td>
                                <input type="checkbox" name="recurring" value="yes"> I am interested in giving on a regular basis.
                            </td>
                        </tr>
 
                        <tr>
                            <td></td>
                            <td>
                                <label for="monthly-amount">Monthly Credit Card $</label>
                                <input type="text" id="monthly-amount" name="monthly-amount">
                                <label for="months-for">For</label>
                                <input type="text" id="months-for" name="months-for">
                                <label>Months</label>
                            </td>
                        </tr>
 
                        <tr>
                            <td></td>
                            <td>
                                <input type="submit" value="Submit">
                                <input type="reset">
                            </td>
                        </tr>
                    </table>
                </fieldset>
            </form>
        </div>
    </main>
 
 
</body>
</html>
